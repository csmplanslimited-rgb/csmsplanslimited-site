<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSMS Plans Limited</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&h=800&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            text-align: center;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 40px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.3em;
            margin-bottom: 40px;
            font-weight: 300;
            opacity: 0.95;
        }

        .email-signup {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 4px;
            font-size: 1em;
        }

        button {
            padding: 14px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            p {
                font-size: 1.1em;
            }
            .email-signup {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🔧</div>
        <h1>csmsplanslimited.com</h1>
        <p>We're building something special</p>
        <p style="font-size: 1.1em; opacity: 0.85;">Check back soon for an update</p>
        
        <!-- Optional: Email capture (you'd need a backend service for this) -->
        <!-- Remove if not needed -->
    </div>
</body>
</html>
